baseURL = "http://blog.timewelltech.ca"

# Change the default theme to be use when building the site with Hugo
theme = "LoveIt"

# website title
title = "Timewell Spent"

# language code ["en", "zh-CN", "fr", "pl", ...]
languageCode = "en"
# language name ["English", "简体中文", "Français", "Polski", ...]
languageName = "English"
# whether to include Chinese/Japanese/Korean
hasCJKLanguage = false

# default amount of posts in each pages
paginate = 12

# copyright description used only for seo schema
copyright = "2022 - 2023 Timewell Tech"

# whether to use robots.txt
enableRobotsTXT = true
# whether to use git commit log
enableGitInfo = true
# whether to use emoji code
enableEmoji = false

# ignore some build errors
ignoreErrors = ["error-remote-getjson", "error-missing-instagram-accesstoken"]

# Author config
[author]
name = "Shawn Timewell"
email = "info@timewelltech.ca"


# Menu config
[menu]
[[menu.main]]
weight = 1
identifier = "posts"
name = "Posts"
url = "/posts/"
# title will be shown when you hover on this menu link
title = "Posts"
[[menu.main]]
weight = 2
identifier = "tags"
name = "Tags"
url = "/tags/"
title = "Tags"
[[menu.main]]
weight = 3
identifier = "categories"
name = "Categories"
url = "/categories/"
title = "Categories"
[[menu.main]]
weight = 4
identifier = "about"
name = "About"
url = "/about/"
title = "About"

[params]
# site default theme ["auto", "light", "dark"]
defaultTheme = "dark"
# public git repo url only then enableGitInfo is true
gitRepo = "https://github.com/stim-ca/blog.timewelltech.ca"
#  date format
dateFormat = "2006-01-02"
# website title for Open Graph and Twitter Cards
title = "Timewell Spent"
# website description for RSS, SEO, Open Graph and Twitter Cards
description = "For learning in the open, and my source of truth for professional development"
# website images for Open Graph and Twitter Cards
images = ["/images/avataaars.svg"]

# Header config
[params.header]
# desktop header mode ["fixed", "normal", "auto"]
desktopMode = "fixed"
# mobile header mode ["fixed", "normal", "auto"]
mobileMode = "auto"
#  Header title config
[params.header.title]
# URL of the LOGO
logo = ""
# title name
name = "Timewell Spent"
# you can add extra information before the name (HTML format is supported), such as icons
pre = ""
# you can add extra information after the name (HTML format is supported), such as icons
post = ""
#  whether to use typeit animation for title name
typeit = false

# Footer config
[params.footer]
enable = true
#  Custom content (HTML format is supported)
custom = ''
#  whether to show Hugo and theme info
hugo = true
#  whether to show copyright info
copyright = true
#  whether to show the author
author = true
# Site creation time
since = 2023
# license info (HTML format is supported)
license = '<a rel="license external nofollow noopener noreffer" href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank">CC BY-NC 4.0</a>'

#  Section (all posts) page config
[params.section]
# special amount of posts in each section page
paginate = 20
# date format (month and day)
dateFormat = "01-02"
# amount of RSS pages
rss = 10

#  List (category or tag) page config
[params.list]
# special amount of posts in each list page
paginate = 20
# date format (month and day)
dateFormat = "01-02"
# amount of RSS pages
rss = 10

#  App icon config
[params.app]
# optional site title override for the app when added to an iOS home screen or Android launcher
title = "Timewell Spent"
# whether to omit favicon resource links
noFavicon = false
# Android browser theme color
themeColor = "#ffffff"
# Safari mask icon color
iconColor = "#5bbad5"
# Windows v8-10 tile color
tileColor = "#da532c"

#  Search config
[params.search]
enable = true
# type of search engine ["lunr", "algolia"]
type = "lunr"
# max index length of the chunked content
contentLength = 4000
# placeholder of the search bar
placeholder = ""
#  max number of results length
maxResultLength = 10
#  snippet length of the result
snippetLength = 30
#  HTML tag name of the highlight part in results
highlightTag = "em"
#  whether to use the absolute URL based on the baseURL in search index
absoluteURL = false

# Home page config
[params.home]
#  amount of RSS pages
rss = 10
# Home page profile
[params.home.profile]
enable = true
# Gravatar Email for preferred avatar in home page
gravatarEmail = ""
# URL of avatar shown in home page
avatarURL = "/images/avatar.png"
#  title shown in home page (HTML format is supported)
title = "Shawn Timewell"
# subtitle shown in home page (HTML format is supported)
subtitle = "Sysadmin by day. Father, Husband, and aspiring DevOps Professional by Night"
# whether to use typeit animation for subtitle
typeit = false
# whether to show social links
social = true
#  disclaimer (HTML format is supported)
disclaimer = ""
# Home page posts
[params.home.posts]
enable = true
# special amount of posts in each home posts page
paginate = 6
#  replaced with hiddenFromHomePage in params.page
# default behavior when you don't set "hiddenFromHomePage" in front matter
defaultHiddenFromHomePage = false

# Social config about the author
[params.social]
GitHub = "stim-ca"
Twitter = ""
Stackoverflow = "stim-ca"
Matrix = ""
Discord = ""
DiscordInvite = ""
Email = ""
RSS = true              # 

#  Page global config
[params.page]
#  whether to hide a page from home page
hiddenFromHomePage = false
#  whether to hide a page from search results
hiddenFromSearch = false
#  whether to enable twemoji
twemoji = false
# whether to enable lightgallery
lightgallery = false
#  whether to enable the ruby extended syntax
ruby = true
#  whether to enable the fraction extended syntax
fraction = false
#  whether to enable the fontawesome extended syntax
fontawesome = true
# whether to show link to Raw Markdown content of the content
linkToMarkdown = true
#  whether to show the full text content in RSS
rssFullText = false
#  Table of the contents config
[params.page.toc]
# whether to enable the table of the contents
enable = true
#  whether to keep the static table of the contents in front of the post
keepStatic = false
# whether to make the table of the contents in the sidebar automatically collapsed
auto = true
[params.page.code]
# whether to show the copy button of the code block
copy = true
# the maximum number of lines of displayed code by default
maxShownLines = 50

[params.page.share]
enable = true
Twitter = true
Facebook = true
Reddit = true

#  Third-party library config
[params.page.library]
[params.page.library.css]
# someCSS = "some.css"
# located in "assets/"
# Or
# someCSS = "https://cdn.example.com/some.css"
[params.page.library.js]
# someJavascript = "some.js"
# located in "assets/"
# Or
# someJavascript = "https://cdn.example.com/some.js"
#  Page SEO config
[params.page.seo]
# image URL
images = []
# Publisher info
[params.page.seo.publisher]
name = ""
logoUrl = ""

#  TypeIt config
[params.typeit]
# typing speed between each step (measured in milliseconds)
speed = 50
# blinking speed of the cursor (measured in milliseconds)
cursorSpeed = 1000
# character used for the cursor (HTML format is supported)
cursorChar = "|"
# cursor duration after typing finishing (measured in milliseconds, "-1" means unlimited)
duration = -1

#  Site SEO config
[params.seo]
# image URL
image = ""
# thumbnail URL
thumbnailUrl = ""

#  Analytics config
[params.analytics]
enable = true
# Plausible Analytics
[params.analytics.plausible]
dataDomain = "blog.timewelltech.ca"
#  Cookie consent config
[params.cookieconsent]
enable = false

# Markup related config in Hugo
[markup]
# Syntax Highlighting
[markup.highlight]
codeFences = true
guessSyntax = true
lineNos = true
lineNumbersInTable = true
# false is a necessary configuration
# (https://github.com/dillonzq/LoveIt/issues/158)
noClasses = false
# Goldmark is from Hugo 0.60 the default library used for Markdown
[markup.goldmark]
[markup.goldmark.extensions]
definitionList = true
footnote = true
linkify = true
strikethrough = true
table = true
taskList = true
typographer = true
[markup.goldmark.renderer]
# whether to use HTML tags directly in the document
unsafe = true
# Table Of Contents settings
[markup.tableOfContents]
startLevel = 2
endLevel = 6

# Sitemap config
[sitemap]
changefreq = "weekly"
filename = "sitemap.xml"
priority = 0.5

# Permalinks config
[Permalinks]
# posts = ":year/:month/:filename"
posts = ":filename"

# Privacy config
[privacy]
#  privacy of the Google Analytics (replaced by params.analytics.google)
[privacy.twitter]
enableDNT = true
[privacy.youtube]
privacyEnhanced = true

# Options to make output .md files
[mediaTypes]
[mediaTypes."text/plain"]
suffixes = ["md"]

# Options to make output .md files
[outputFormats.MarkDown]
mediaType = "text/plain"
isPlainText = true
isHTML = false

# Options to make hugo output files
[outputs]
# 
home = ["HTML", "RSS", "JSON"]
page = ["HTML", "MarkDown"]
section = ["HTML", "RSS"]
taxonomy = ["HTML", "RSS"]
taxonomyTerm = ["HTML"]
